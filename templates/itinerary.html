<!DOCTYPE html>

<html>

<head>

    <title>AI Travel Chatbot</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        #chatbox {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            background: #f9f9f9;
        }

        .user {
            text-align: right;
            color: blue;
            margin: 10px;
        }

        .bot {
            text-align: left;
            color: green;
            margin: 10px;
        }

        .itinerary-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            line-height: 1.6;
            font-size: 15px;
        }

        .itinerary-box h2,
        .itinerary-box h3 {
            color: #007bff;
            margin-top: 15px;
        }

        .itinerary-box strong {
            color: #333;
        }

        .itinerary-box ul {
            padding-left: 20px;
        }

        .itinerary-box li {
            margin-bottom: 8px;
        }

        .itinerary-box {
            border-left: 5px solid #007bff;
        }
    </style>

</head>

<body>

    <div class="container mt-4">

        <h2>AI Travel Planner Chatbot</h2>

        <div id="chatbox">

            {% if user_message %}

            <div class="user">{{ user_message }}</div>
            {% endif %}

            {% if bot_reply %}

            <div class="bot">{{ bot_reply }}</div>
            {% endif %}

        </div>

        <form method="POST" action="/itinerary">

            <div class="input-group mt-3">

                <input type="text" name="message" class="form-control"
                    placeholder="Ask something like: Generate a 3 day itinerary" required>

                <button class="btn btn-primary">
                    Send
                </button>
                <div class="container mt-4">
                    <h3>Your Travel Plan</h3>

                    {% if bot_reply %}
                    <div class="itinerary-box">
                        {{ bot_reply | safe }}
                    </div>
                    {% else %}
                    <p>No itinerary generated yet.</p>
                    {% endif %}
                </div>
            </div>

        </form>

    </div>

</body>

</html>
