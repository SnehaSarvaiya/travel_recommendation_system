<!DOCTYPE html>

<html>

<head>

    <title>Search Places</title>

    <meta charset="utf-8">

    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <style>
        body {
            font-family: Arial;
        }

        #map {
            width: 100%;
            height: 500px;
            margin-top: 20px;
        }

        .search-box {
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Search Places</h2>

        <div class="search-box">

            <input type="text" id="placeInput" placeholder="Enter a place" style="width:300px;height:35px">

            <button onclick="searchPlace()">Search</button>

        </div>

        <div id="map"></div>

    </div>

    <script>

        mapboxgl.accessToken = "YOUR_MAPBOX_ACCESS_TOKEN";

        const map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/streets-v11",
            center: [78.9629, 20.5937],
            zoom: 4
        });

        let marker;

        async function searchPlace() {

            let place = document.getElementById("placeInput").value;

            let url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${place}.json?access_token=${mapboxgl.accessToken}`;

            let response = await fetch(url);

            let data = await response.json();

            let coordinates = data.features[0].center;

            map.flyTo({
                center: coordinates,
                zoom: 10
            });

            if (marker) {
                marker.remove();
            }

            marker = new mapboxgl.Marker()
                .setLngLat(coordinates)
                .addTo(map);

        }

    </script>

</body>

</html>
